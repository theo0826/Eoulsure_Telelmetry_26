<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOULSURE TELEMETRY v5.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 모던하고 깊이감 있는 다크 테마 */
            --bg-color: #0a0a0c;        
            --panel-bg: #141417;        
            --sidebar-bg: #0f0f12;      
            --text-main: #f0f0f0;
            --text-dim: #7a7a85;
            /* 테슬라 느낌의 차분하고 고급스러운 포인트 컬러 */
            --accent-green: #20d659;   
            --accent-red: #ff3b30;     
            --accent-blue: #0a84ff;    
            --accent-orange: #ff9f0a;
            --accent-yellow: #ffd60a;
            --accent-purple: #bf5af2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.3px;
        }

        /* 1. 사이드바 (깔끔한 경계와 여백) */
        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 30px 25px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 30px;
            padding-bottom: 15px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .brand span { color: var(--accent-blue); }

        .data-group { margin-bottom: 25px; }
        .group-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .data-row {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 8px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .data-row:last-child { border-bottom: none; }
        
        .data-label { font-size: 0.85rem; color: #a0a0ab; font-weight: 300; }
        .data-val { font-size: 1.1rem; font-weight: 700; }
        .unit { font-size: 0.7rem; color: var(--text-dim); margin-left: 4px; font-weight: 400; }

        /* 2. 메인 컨텐츠 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            gap: 20px;
            overflow-y: auto;
        }

        /* --- 배터리 게이지 섹션 (슬릭한 프로그레스 바 스타일) --- */
        .gauge-container {
            display: flex;
            gap: 20px;
            background: var(--panel-bg);
            padding: 20px 25px;
            border-radius: 16px;
            justify-content: space-around;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .battery-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            justify-content: center;
        }

        .battery-info {
            text-align: right;
            min-width: 90px;
        }
        .batt-label { font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 4px; font-weight: 700;}
        .batt-percent { font-size: 1.5rem; font-weight: 700; }

        /* 미니멀한 배터리 바 */
        .battery-icon {
            width: 100px;
            height: 10px;
            background: #222226;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .battery-level {
            height: 100%;
            width: 0%; 
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s ease;
        }

        /* 차트 그리드 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            grid-auto-rows: 260px;
            gap: 20px;
            padding-bottom: 20px;
        }

        .chart-card {
            background-color: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .chart-title { 
            font-size: 0.8rem; 
            color: var(--text-dim); 
            margin-bottom: 15px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        .canvas-container { flex: 1; position: relative; width: 100%; overflow: hidden; }

        #status-badge { 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            background: #222226; 
            color: var(--text-dim); 
            font-weight: 700;
            display: inline-block;
        }
        #status-badge.live { 
            background: rgba(32, 214, 89, 0.15); 
            color: var(--accent-green); 
        }

    </style>
</head>
<body>

    <aside>
        <div class="brand">KSAE <span>MONITOR</span></div>
        
        <div class="data-group">
            <div class="group-title">Dynamics</div>
            <div class="data-row"><span class="data-label">Speed</span> <div><span id="val-speed" class="data-val">0</span><span class="unit">km/h</span></div></div>
            <div class="data-row"><span class="data-label">RPM</span> <div><span id="val-rpm" class="data-val" style="color:var(--accent-orange)">0</span><span class="unit">rpm</span></div></div>
            <div class="data-row"><span class="data-label">Torque</span> <div><span id="val-torque" class="data-val">0</span><span class="unit">Nm</span></div></div>
        </div>

        <div class="data-group">
            <div class="group-title">MC Status</div>
            <div class="data-row">
                <span class="data-label">Fault Code</span> 
                <div style="text-align: right;"><span id="val-mc-fault" class="data-val" style="color:var(--accent-green)">OK</span></div>
            </div>
        </div>

        <div class="data-group">
            <div class="group-title">HV System</div>
            <div class="data-row"><span class="data-label">Volt</span> <div><span id="val-hv-volt" class="data-val" style="color:var(--accent-red)">0.0</span><span class="unit">V</span></div></div>
            <div class="data-row"><span class="data-label">Curr</span> <div><span id="val-hv-curr" class="data-val" style="color:var(--accent-yellow)">0.0</span><span class="unit">A</span></div></div>
            <div class="data-row"><span class="data-label">Temp</span> <div><span id="val-hv-temp" class="data-val">0</span><span class="unit">°C</span></div></div>
        </div>

        <div class="data-group">
            <div class="group-title">LV System</div>
            <div class="data-row"><span class="data-label">LV1</span> <div><span id="val-lv1" class="data-val" style="color:var(--accent-blue)">0.0</span><span class="unit">V</span></div></div>
            <div class="data-row"><span class="data-label">LV2</span> <div><span id="val-lv2" class="data-val" style="color:var(--accent-purple)">0.0</span><span class="unit">V</span></div></div>
        </div>

        <div class="data-group">
            <div class="group-title">G-Force</div>
            <div class="data-row"><span class="data-label">Lat (X)</span> <div><span id="val-acc-x" class="data-val">0.0</span><span class="unit">G</span></div></div>
            <div class="data-row"><span class="data-label">Long (Y)</span> <div><span id="val-acc-y" class="data-val">0.0</span><span class="unit">G</span></div></div>
        </div>

        <div style="margin-top:auto; font-size:0.8rem; color:#555; text-align: center;">
            <span id="status-badge">OFFLINE</span>
        </div>
    </aside>

    <main>
        <div class="gauge-container">
            <div class="battery-wrapper">
                <div class="battery-info">
                    <span class="batt-label">HV SOC</span>
                    <span class="batt-percent" id="soc-hv-text" style="color:var(--accent-yellow)">0%</span>
                </div>
                <div class="battery-icon">
                    <div class="battery-level" id="soc-hv-bar" style="background-color:var(--accent-yellow)"></div>
                </div>
            </div>

            <div class="battery-wrapper">
                <div class="battery-info">
                    <span class="batt-label">LV1 MAIN</span>
                    <span class="batt-percent" id="soc-lv1-text" style="color:var(--accent-blue)">0%</span>
                </div>
                <div class="battery-icon">
                    <div class="battery-level" id="soc-lv1-bar" style="background-color:var(--accent-blue)"></div>
                </div>
            </div>

            <div class="battery-wrapper">
                <div class="battery-info">
                    <span class="batt-label">LV2 AUX</span>
                    <span class="batt-percent" id="soc-lv2-text" style="color:var(--accent-purple)">0%</span>
                </div>
                <div class="battery-icon">
                    <div class="battery-level" id="soc-lv2-bar" style="background-color:var(--accent-purple)"></div>
                </div>
            </div>
        </div>

        <!-- LED 패널 삭제됨 -->

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">DRIVING DYNAMICS</div>
                <div class="canvas-container"><canvas id="chart-drive"></canvas></div>
            </div>
            
            <div class="chart-card">
                <div class="chart-title">LV BATTERY VOLTAGE</div>
                <div class="canvas-container"><canvas id="chart-lv"></canvas></div>
            </div>

            <div class="chart-card">
                <div class="chart-title">HV TOTAL VOLTAGE</div>
                <div class="canvas-container"><canvas id="chart-hv-volt"></canvas></div>
            </div>

            <div class="chart-card">
                <div class="chart-title">HV CURRENT & TEMP</div>
                <div class="canvas-container"><canvas id="chart-hv-stat"></canvas></div>
            </div>

            <div class="chart-card">
                <div class="chart-title">G-FORCE</div>
                <div class="canvas-container"><canvas id="chart-gforce"></canvas></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFstdl0Ai_WsYiwxFTFKo4UeM9-IzhSCA",
            authDomain: "eoulsure-26.firebaseapp.com",
            databaseURL: "https://eoulsure-26-default-rtdb.firebaseio.com",
            projectId: "eoulsure-26",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const mcFaultMap = {
            0x4441: "Motor Characterisation Mode",
            0x4C41: "Too many slaves",
            0x5041: "Bad NVM Data",
            0x5042: "VPDO Out of Range",
            0x5043: "Static Range Error",
            0x5044: "Dynamic Range Error",
            0x5441: "Incompatible hardware version",
            0x5442: "Calibration Fault",
            0x4481: "Handbrake Fault (warn)",
            0x4881: "Seat Fault",
            0x4882: "Two Direction Fault",
            0x4883: "SRO Fault",
            0x4884: "Sequence Fault",
            0x4885: "FS1 Recycle Fault",
            0x4886: "Inch Fault",
            0x488D: "Belly fault",
            0x5081: "Invalid Steer Switches",
            0x54C1: "PowerFrame Overvoltage Fault",
            0x54C2: "PowerFrame Fault",
            0x54C3: "PowerFrame s/c M1 upper",
            0x54C4: "PowerFrame s/c M1 lower",
            0x54C5: "PowerFrame s/c M2 upper",
            0x54C6: "PowerFrame s/c M2 lower",
            0x54C7: "PowerFrame s/c M3 upper",
            0x54C8: "PowerFrame s/c M3 lower",
            0x54C9: "PowerFrame s/c checks incomplete",
            0x5101: "Line Contactor o/c",
            0x5102: "Line Contactor welded",
            0x5103: "Contactor Drive Fault",
            0x4546: "No Motor Speed Signal",
            0x4548: "Steer Sensor warning",
            0x454C: "Electrolyte Low Level",
            0x454D: "Electrolyte Cutout Level",
            0x4D42: "Motor Open Circuit Fault",
            0x4D43: "Motor stalled",
            0x458A: "Seat (warning)",
            0x458B: "Footbrake (warning)",
            0x4981: "Throttle Fault",
            0x4982: "E-Brake Wire off",
            0x4983: "Direction Change",
            0x5181: "Digital Input Wire Off",
            0x5182: "Analog Input Wire Off",
            0x5183: "Analog Output Over Current",
            0x5184: "Analog Output On with No Failsafe",
            0x5185: "Analog Output Off with Failsafe",
            0x5186: "Analog Output Over Temperature",
            0x5187: "Analog Output Under Current",
            0x5188: "Analog Output Short Circuit",
            0x45C1: "BDI (battery discharge) warning",
            0x45C2: "BDI (battery discharge) cutout",
            0x45C3: "Low Battery cutout",
            0x45C4: "High Battery cutout",
            0x45C5: "High Capacitor cutout",
            0x45C6: "Vbat below rated min",
            0x45C7: "Vbat above rated max",
            0x45C8: "Vcap above rated max",
            0x45C9: "Vcap cutback for motoring torque",
            0x45CA: "Vcap cutback for regen torque",
            0x45CE: "Vcap to Vkey (Vbat) difference",
            0x4DC3: "Power Supply (keyswitch) Critical",
            0x51C2: "Capacitor Precharge Failure",
            0x4601: "Device too cold",
            0x4602: "Device too hot",
            0x4603: "Motor in thermal cutback",
            0x4604: "Motor too cold",
            0x5201: "Heatsink / device overtemp",
            0x4681: "Unit in pre-operational",
            0x4682: "IO can't initialise",
            0x4683: "RPDO Timeout (warning)",
            0x4A81: "RPDO Timeout (drive inhibit)",
            0x4E81: "RPDO Timeout (severe)",
            0x46C2: "SinCos Tracking Warning",
            0x46C3: "Fault Ride Through",
            0x46C6: "Encoder PLL Deactivated (warning)",
            0x52C1: "Encoder Fault",
            0x52C2: "Motor Overcurrent Fault",
            0x52C3: "Current Control Fault",
            0x52C4: "Motor Overspeed Fault",
            0x4B01: "CAN bus-off (drive inhibit)",
            0x4F01: "CANopen unexpected slave state",
            0x5301: "CAN bus Fault",
            0x5302: "CANopen Bootup not received",
            0x5304: "CAN Lo-Pri Tx queue overrun",
            0x5305: "CAN Hi-Pri Rx queue overrun",
            0x5306: "CAN Hi-Pri Tx queue overrun",
            0x5308: "CAN bus-off",
            0x530A: "CANopen Short PDO received",
            0x530B: "CANopen Heartbeat Failed",
            0x530C: "CANopen device in wrong state",
            0x530F: "CANopen SDO Timeout Error",
            0x5319: "Motor slave in wrong state",
            0x4741: "Scheduler stack overflow warning",
            0x4F41: "Internal SW Fault",
            0x4F42: "Out of memory",
            0x4F43: "General DSP error",
            0x4F44: "Timer Error",
            0x4F45: "Queue Error",
            0x4F46: "Scheduler Error",
            0x4F48: "I/O Internal SW Error",
            0x4F49: "GIO Internal SW Error",
            0x4F4C: "OBD Internal SW Error",
            0x4F4D: "VehApp Internal SW Error",
            0x4F4E: "DMC Internal SW Error",
            0x4F4F: "TracApp Internal SW Error",
            0x4F53: "App Manager Internal SW Error",
            0x4F54: "Autozero Range Error",
            0x4F55: "DSP motor parameter error",
            0x5343: "Fault List Overflow",
            0x5345: "Scheduler stack Overflow",
            0x4781: "CANopen anon EMCY level 1",
            0x4B81: "CANopen anon EMCY level 2",
            0x4F81: "CANopen anon EMCY level 3",
            0x5381: "CANopen anon EMCY level 4",
            0x5781: "CANopen anon EMCY level 5",
            0x47C1: "Vehicle Service Required"
        };

        function getLiFePO4Percentage(voltage) {
            if (!voltage || voltage < 10.0) return 0; 
            if (voltage >= 13.4) return 100;
            if (voltage >= 13.3) return 90; 
            if (voltage >= 13.2) return 70; 
            if (voltage >= 13.1) return 40; 
            if (voltage >= 13.0) return 30;
            if (voltage >= 12.9) return 20;
            if (voltage >= 12.8) return 15; 
            if (voltage >= 12.5) return 10;
            if (voltage >= 12.0) return 5;  
            return 0;
        }

        function updateGauge(barId, textId, percent) {
            const bar = document.getElementById(barId);
            const text = document.getElementById(textId);
            
            text.innerText = percent + "%";
            bar.style.width = percent + "%";
            
            if(percent <= 20) bar.style.backgroundColor = "var(--accent-red)";
        }

        // --- 차트 생성 (더 모던하고 깔끔한 설정) ---
        Chart.defaults.color = '#7a7a85';
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';
        Chart.defaults.font.family = "'JetBrains Mono', sans-serif";
        const maxPoints = 50;

        const chartDrive = createChart('chart-drive', ['Speed (km/h)', 'RPM'], ['#20d659', '#ff9f0a'], true);
        const chartLv = createChart('chart-lv', ['LV1 (V)', 'LV2 (V)'], ['#0a84ff', '#bf5af2'], false);
        const chartHvVolt = createChart('chart-hv-volt', ['HV Volt (V)'], ['#ff3b30'], false);
        const chartHvStat = createChart('chart-hv-stat', ['Current (A)', 'Temp (°C)'], ['#ffd60a', '#ffffff'], true);
        const chartG = createChart('chart-gforce', ['Lat X', 'Long Y'], ['#0a84ff', '#888888'], false);

        function createChart(id, labels, colors, dualAxis=false) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: labels.map((l, i) => ({
                    label: l, data: [], borderColor: colors[i], borderWidth: 2, tension: 0.4, pointRadius: 0,
                    yAxisID: (dualAxis && i===1) ? 'y1' : 'y'
                }))},
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { display: false },
                        y: { position: 'left', grid: { color: 'rgba(255, 255, 255, 0.03)'} },
                        y1: { display: dualAxis, position: 'right', grid: { drawOnChartArea: false } }
                    },
                    plugins: { 
                        legend: { 
                            display: true, 
                            labels: { usePointStyle: true, boxWidth: 3, padding:100 } 
                        } 
                    }
                }
            });
        }

        const connectionEl = document.getElementById("status-badge");
        onValue(ref(db, ".info/connected"), (snap) => {
            if(snap.val()) { connectionEl.innerText = "ONLINE"; connectionEl.classList.add("live"); }
            else { connectionEl.innerText = "OFFLINE"; connectionEl.classList.remove("live"); }
        });

        onValue(ref(db, 'telemetry'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                updateText('val-speed', data.speed);
                updateText('val-rpm', data.rpm);
                updateText('val-torque', data.torque);
                updateText('val-hv-volt', fmt(data.hv_volt));
                updateText('val-hv-curr', fmt(data.hv_curr));
                updateText('val-hv-temp', data.hv_temp);
                updateText('val-lv1', fmt(data.lv_volt1));
                updateText('val-lv2', fmt(data.lv_volt2));
                updateText('val-acc-x', fmt(data.acc_x, 2));
                updateText('val-acc-y', fmt(data.acc_y, 2));

                const mcFault = data.mc_fault || 0;
                const faultEl = document.getElementById('val-mc-fault');
                if (faultEl) {
                    if (mcFault === 0) {
                        faultEl.innerText = "OK";
                        faultEl.style.color = "var(--accent-green)";
                        faultEl.style.fontSize = "1.1rem";
                    } else {
                        const hexCode = "0x" + mcFault.toString(16).toUpperCase();
                        const faultMsg = mcFaultMap[mcFault] || "Unknown Error";
                        faultEl.innerText = `${hexCode}\n(${faultMsg})`;
                        faultEl.style.color = "var(--accent-red)";
                        faultEl.style.fontSize = "0.75rem";
                    }
                }

                updateGauge('soc-hv-bar', 'soc-hv-text', data.hv_soc || 0); 
                const lv1_pct = getLiFePO4Percentage(data.lv_volt1); 
                const lv2_pct = getLiFePO4Percentage(data.lv_volt2); 
                updateGauge('soc-lv1-bar', 'soc-lv1-text', lv1_pct);
                updateGauge('soc-lv2-bar', 'soc-lv2-text', lv2_pct);

                // LED 토글 로직 삭제됨

                const now = new Date().toLocaleTimeString();
                pushData(chartDrive, now, [data.speed||0, data.rpm||0]);
                pushData(chartLv, now, [data.lv_volt1||0, data.lv_volt2||0]);
                pushData(chartHvVolt, now, [data.hv_volt||0]);
                pushData(chartHvStat, now, [data.hv_curr||0, data.hv_temp||0]);
                pushData(chartG, now, [data.acc_x||0, data.acc_y||0]);
            }
        });

        function updateText(id, val) { const el = document.getElementById(id); if(el) el.innerText = val; }
        function fmt(val, d=1) { return val ? val.toFixed(d) : 0; }
        function pushData(chart, label, values) {
            chart.data.labels.push(label);
            values.forEach((val, idx) => chart.data.datasets[idx].data.push(val));
            if(chart.data.labels.length > maxPoints) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(ds => ds.data.shift());
            }
            chart.update();
        }
    </script>
</body>
</html>
